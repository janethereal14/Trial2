<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You</title>
    <style>
        :root {
            --primary-red: #ff4d4d;
            --bg-black: #0a0a0a;
        }

        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--bg-black);
            color: var(--primary-red);
            font-family: 'Courier New', Courier, monospace;
            overflow-x: hidden;
            scrollbar-width: none; 
        }
        body::-webkit-scrollbar { display: none; }

        /* Screens */
        .screen { display: none; text-align: center; position: relative; z-index: 2; }
        #lock-screen { 
            display: flex; 
            position: fixed; 
            inset: 0; 
            background: var(--bg-black); 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            z-index: 1000; 
        }
        
        #pass-input { 
            background: transparent; 
            border: none; 
            border-bottom: 2px solid var(--primary-red); 
            color: var(--primary-red); 
            padding: 10px; 
            text-align: center; 
            font-size: 1.5rem; 
            outline: none; 
            margin-bottom: 20px; 
            width: 150px; 
        }
        .btn-red { 
            background: var(--primary-red); 
            color: black; 
            border: none; 
            padding: 12px 30px; 
            cursor: pointer; 
            font-weight: bold; 
            letter-spacing: 2px; 
        }

        /* Canvas Hearts */
        #heartCanvas { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 1; }

        /* Main Content */
        #main-content { padding-top: 80vh; padding-bottom: 20vh; }
        .para { font-size: 1.8rem; margin: 600px auto; max-width: 80%; opacity: 0; transition: opacity 2s; }
        .visible { opacity: 1; }

        /* Round Button */
        #reveal-btn {
            width: 100px; height: 100px; border-radius: 50%; background: var(--primary-red);
            color: black; border: none; font-weight: bold; cursor: pointer;
            margin: 100px auto; display: none; align-items: center; justify-content: center;
            box-shadow: 0 0 20px var(--primary-red);
        }

        /* Question Screen */
        #question-screen { 
            position: fixed; inset: 0; background: var(--bg-black); 
            z-index: 2000; flex-direction: column; justify-content: center; 
            align-items: center; padding: 20px; 
        }
        .btn-group { display: flex; gap: 20px; margin-top: 30px; position: relative; }

        /* Video Screen */
        #video-screen { 
            position: fixed; inset: 0; background: black; 
            z-index: 3000; display: none; justify-content: center; align-items: center; 
        }
        video { 
            max-width: 90%; 
            max-height: 80vh; 
            border: 2px solid var(--primary-red); 
            box-shadow: 0 0 30px rgba(255, 77, 77, 0.5);
        }
    </style>
</head>
<body>

    <audio id="bg-music" src="music.mp3" loop preload="auto"></audio>

    <div id="lock-screen">
        <input type="password" id="pass-input" placeholder="CODE" maxlength="4">
        <button class="btn-red" id="unlock-btn">ENTER PASSWORD</button>
    </div>

    <canvas id="heartCanvas"></canvas>
    <div id="main-content" class="screen">
        <p class="para" data-text="I wanted to show you something special..."></p>
        <p class="para" data-text="Every heart you see falling..."></p>
        <p class="para" data-text="Is a reminder of how amazing you are."></p>
        <p class="para" data-text="Are you ready for the final part?"></p>
        <button id="reveal-btn">TAP ME</button>
    </div>

    <div id="question-screen" class="screen">
        <h2 style="font-size: 2.2rem;">Wait!</h2>
        <p style="max-width: 500px; line-height: 1.6; font-size: 1.2rem;">
            Before the video plays, I have one question... <br><br>
            Will you be mine forever?
        </p>
        <div class="btn-group">
            <button class="btn-red" id="yes-btn">YES</button>
            <button class="btn-red" id="no-btn">NO</button>
        </div>
    </div>

    <div id="video-screen">
        <video id="final-video" playsinline controls preload="auto">
            <source src="video.mp4" type="video/mp4">
            Your browser doesn't support the video.
        </video>
    </div>

    <script>
        const passInput = document.getElementById('pass-input');
        const unlockBtn = document.getElementById('unlock-btn');
        const music = document.getElementById('bg-music');
        const noBtn = document.getElementById('no-btn');
        const finalVideo = document.getElementById('final-video');

        // --- Unlock & Start ---
        unlockBtn.addEventListener('click', () => {
            if (passInput.value === '1423') {
                // "Prime" the media for mobile browsers
                music.load();
                finalVideo.load();
                
                music.play().catch(err => console.log("Music waiting for interaction"));
                
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                startHearts();
                runTypewriter();
                autoScroll();
            } else {
                alert("Wrong code!");
            }
        });

        // --- No Button Trap ---
        noBtn.addEventListener('mouseover', () => {
            noBtn.style.position = 'absolute';
            noBtn.style.left = Math.random() * 80 + '%';
            noBtn.style.top = Math.random() * 80 + '%';
            // If they are too fast, just hide it
            setTimeout(() => { noBtn.style.display = 'none'; }, 1000);
        });

        // --- Navigation ---
        function showRoundButton() {
            document.getElementById('reveal-btn').style.display = 'flex';
        }

        document.getElementById('reveal-btn').addEventListener('click', () => {
            document.getElementById('question-screen').style.display = 'flex';
        });

        document.getElementById('yes-btn').addEventListener('click', () => {
            document.getElementById('video-screen').style.display = 'flex';
            music.pause();
            finalVideo.play().catch(e => {
                console.log("Auto-play failed, user must hit play on video controls");
            });
        });

        // --- Heart Animation ---
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');
        let hearts = [];
        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;

        class Heart {
            constructor() { this.init(); }
            init() {
                this.x = Math.random() * canvas.width;
                this.y = -20;
                this.size = Math.random() * 15 + 10;
                this.speed = Math.random() * 1.5 + 0.5;
                this.rot = 0;
                this.rotS = (Math.random() - 0.5) * 0.05;
                this.op = 1;
            }
            draw() {
                ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.rot); ctx.globalAlpha = this.op;
                ctx.fillStyle = '#ff4d4d'; ctx.beginPath(); ctx.moveTo(0,0);
                ctx.bezierCurveTo(-this.size/2,-this.size/2,-this.size,this.size/3,0,this.size);
                ctx.bezierCurveTo(this.size,this.size/3,this.size/2,-this.size/2,0,0); ctx.fill(); ctx.restore();
            }
            update() {
                this.y += this.speed;
                this.rot += this.rotS;
                this.op -= 0.001; 
                if(this.y > canvas.height || this.op <= 0) this.init();
            }
        }

        function startHearts() {
            for(let i=0; i<40; i++) hearts.push(new Heart());
            function anim() { ctx.clearRect(0,0,canvas.width,canvas.height); hearts.forEach(h=>{h.update();h.draw();}); requestAnimationFrame(anim); }
            anim();
        }

        // --- Typewriter & Scroll ---
        async function runTypewriter() {
            const paras = document.querySelectorAll('.para');
            for (let p of paras) {
                p.classList.add('visible');
                let txt = p.getAttribute('data-text');
                for (let c of txt) { p.textContent += c; await new Promise(r => setTimeout(r, 70)); }
                await new Promise(r => setTimeout(r, 1500));
            }
        }

        function autoScroll() {
            let pos = 0;
            function step() {
                pos += 0.8;
                window.scrollTo(0, pos);
                if (pos < document.body.scrollHeight - window.innerHeight) {
                    requestAnimationFrame(step);
                } else {
                    showRoundButton();
                }
            }
            setTimeout(step, 3000);
        }
    </script>
</body>
  </html>
